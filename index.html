<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ultra Translator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e1b4b,#111827);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:rgba(139,92,246,0.25);
    filter:blur(120px);
    border-radius:50%;
    top:-200px;
    left:-100px;
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(59,130,246,0.2);
    filter:blur(120px);
    border-radius:50%;
    bottom:-200px;
    right:-100px;
}

.container{
    width:100%;
    max-width:1200px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:30px;
    padding:30px;
    position:relative;
    z-index:10;
    box-shadow:0 0 40px rgba(0,0,0,0.4);
}

.title{
    text-align:center;
    color:white;
    font-size:38px;
    font-weight:700;
    margin-bottom:30px;
}

.translator-box{
    display:grid;
    grid-template-columns:1fr 80px 1fr;
    gap:20px;
}

.panel{
    background:rgba(255,255,255,0.06);
    border-radius:25px;
    padding:20px;
    border:1px solid rgba(255,255,255,0.08);
}

.select-box{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#111827;
    color:white;
    font-size:15px;
    outline:none;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:260px;
    resize:none;
    border:none;
    outline:none;
    border-radius:20px;
    padding:20px;
    background:#0f172a;
    color:white;
    font-size:17px;
}

.controls{
    display:flex;
    justify-content:space-between;
    margin-top:18px;
    gap:10px;
}

.btn{
    flex:1;
    border:none;
    padding:14px;
    border-radius:16px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
    color:white;
    transition:0.3s;
    background:linear-gradient(135deg,#7c3aed,#2563eb);
}

.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.swap{
    display:flex;
    justify-content:center;
    align-items:center;
}

.swap button{
    width:65px;
    height:65px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    background:linear-gradient(135deg,#8b5cf6,#3b82f6);
    color:white;
    font-size:26px;
    transition:0.3s;
}

.swap button:hover{
    transform:rotate(180deg) scale(1.1);
}

.translate-btn{
    width:100%;
    margin-top:25px;
    padding:18px;
    border:none;
    border-radius:20px;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    color:white;
    background:linear-gradient(135deg,#9333ea,#2563eb);
    transition:0.3s;
}

.translate-btn:hover{
    transform:scale(1.02);
    box-shadow:0 10px 30px rgba(124,58,237,0.5);
}

.footer{
    text-align:center;
    color:#cbd5e1;
    margin-top:20px;
    font-size:14px;
}

@media(max-width:900px){
    .translator-box{
        grid-template-columns:1fr;
    }

    .swap{
        transform:rotate(90deg);
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="title">🌍 Ultra Translator AI</div>

    <div class="translator-box">

        <!-- LEFT -->
        <div class="panel">
            <select class="select-box" id="fromLang"></select>

            <textarea id="inputText" placeholder="Matn kiriting..."></textarea>

            <div class="controls">
                <button class="btn" onclick="copyText('inputText')">
                    📋 Nusxalash
                </button>

                <button class="btn" onclick="speakText('inputText','fromLang')">
                    🔊 Ovoz
                </button>
            </div>
        </div>

        <!-- SWAP -->
        <div class="swap">
            <button onclick="swapLanguages()">⇄</button>
        </div>

        <!-- RIGHT -->
        <div class="panel">
            <select class="select-box" id="toLang"></select>

            <textarea id="outputText" placeholder="Tarjima..." readonly></textarea>

            <div class="controls">
                <button class="btn" onclick="copyText('outputText')">
                    📋 Nusxalash
                </button>

                <button class="btn" onclick="speakText('outputText','toLang')">
                    🔊 Ovoz
                </button>
            </div>
        </div>

    </div>

    <button class="translate-btn" onclick="translateText()">
        ⚡ Tarjima Qilish
    </button>

    <div class="footer">
        127+ tillik professional translator
    </div>

</div>

<script>

const languages = {
    "af":"Afrikaans",
    "sq":"Albanian",
    "am":"Amharic",
    "ar":"Arabic",
    "hy":"Armenian",
    "az":"Azerbaijani",
    "eu":"Basque",
    "be":"Belarusian",
    "bn":"Bengali",
    "bs":"Bosnian",
    "bg":"Bulgarian",
    "ca":"Catalan",
    "ceb":"Cebuano",
    "ny":"Chichewa",
    "zh":"Chinese",
    "co":"Corsican",
    "hr":"Croatian",
    "cs":"Czech",
    "da":"Danish",
    "nl":"Dutch",
    "en":"English",
    "eo":"Esperanto",
    "et":"Estonian",
    "tl":"Filipino",
    "fi":"Finnish",
    "fr":"French",
    "fy":"Frisian",
    "gl":"Galician",
    "ka":"Georgian",
    "de":"German",
    "el":"Greek",
    "gu":"Gujarati",
    "ht":"Haitian Creole",
    "ha":"Hausa",
    "haw":"Hawaiian",
    "he":"Hebrew",
    "hi":"Hindi",
    "hmn":"Hmong",
    "hu":"Hungarian",
    "is":"Icelandic",
    "ig":"Igbo",
    "id":"Indonesian",
    "ga":"Irish",
    "it":"Italian",
    "ja":"Japanese",
    "jw":"Javanese",
    "kn":"Kannada",
    "kk":"Kazakh",
    "km":"Khmer",
    "ko":"Korean",
    "ku":"Kurdish",
    "ky":"Kyrgyz",
    "lo":"Lao",
    "la":"Latin",
    "lv":"Latvian",
    "lt":"Lithuanian",
    "lb":"Luxembourgish",
    "mk":"Macedonian",
    "mg":"Malagasy",
    "ms":"Malay",
    "ml":"Malayalam",
    "mt":"Maltese",
    "mi":"Maori",
    "mr":"Marathi",
    "mn":"Mongolian",
    "my":"Myanmar",
    "ne":"Nepali",
    "no":"Norwegian",
    "or":"Odia",
    "ps":"Pashto",
    "fa":"Persian",
    "pl":"Polish",
    "pt":"Portuguese",
    "pa":"Punjabi",
    "ro":"Romanian",
    "ru":"Russian",
    "sm":"Samoan",
    "gd":"Scots Gaelic",
    "sr":"Serbian",
    "st":"Sesotho",
    "sn":"Shona",
    "sd":"Sindhi",
    "si":"Sinhala",
    "sk":"Slovak",
    "sl":"Slovenian",
    "so":"Somali",
    "es":"Spanish",
    "su":"Sundanese",
    "sw":"Swahili",
    "sv":"Swedish",
    "tg":"Tajik",
    "ta":"Tamil",
    "tt":"Tatar",
    "te":"Telugu",
    "th":"Thai",
    "tr":"Turkish",
    "tk":"Turkmen",
    "uk":"Ukrainian",
    "ur":"Urdu",
    "ug":"Uyghur",
    "uz":"Uzbek",
    "vi":"Vietnamese",
    "cy":"Welsh",
    "xh":"Xhosa",
    "yi":"Yiddish",
    "yo":"Yoruba",
    "zu":"Zulu"
};

const fromLang = document.getElementById("fromLang");
const toLang = document.getElementById("toLang");

for(let code in languages){

    let option1 = document.createElement("option");
    option1.value = code;
    option1.innerText = languages[code];
    fromLang.appendChild(option1);

    let option2 = document.createElement("option");
    option2.value = code;
    option2.innerText = languages[code];
    toLang.appendChild(option2);
}

fromLang.value = "uz";
toLang.value = "en";

async function translateText(){

    const text = document.getElementById("inputText").value;

    if(!text) return;

    const url =
    `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${fromLang.value}|${toLang.value}`;

    const response = await fetch(url);

    const data = await response.json();

    document.getElementById("outputText").value =
    data.responseData.translatedText;
}

function copyText(id){

    const text = document.getElementById(id);

    navigator.clipboard.writeText(text.value);

    alert("Matn nusxalandi!");
}

function speakText(textId,langId){

    const text = document.getElementById(textId).value;

    const lang = document.getElementById(langId).value;

    const speech = new SpeechSynthesisUtterance(text);

    speech.lang = lang;

    speech.rate = 1;

    speech.pitch = 1;

    speech.volume = 1;

    window.speechSynthesis.speak(speech);
}

function swapLanguages(){

    let tempLang = fromLang.value;
    fromLang.value = toLang.value;
    toLang.value = tempLang;

    let tempText =
    document.getElementById("inputText").value;

    document.getElementById("inputText").value =
    document.getElementById("outputText").value;

    document.getElementById("outputText").value =
    tempText;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Checkers PRO ULTRA</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    overflow:hidden;
    font-family:sans-serif;
    background:
    radial-gradient(circle at top,#1e293b,#020617);
    touch-action:manipulation;
}

/* GAME WRAP */

#gameWrap{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* MENU */

#menu{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:18px;
    background:
    rgba(0,0,0,.94);
    z-index:100;
    backdrop-filter:blur(20px);
}

.title{
    color:white;
    font-size:
    clamp(34px,6vw,52px);
    font-weight:bold;
    text-shadow:
    0 0 25px orange;
}

/* BUTTONS */

button{
    border:none;
    cursor:pointer;
    color:white;
    font-weight:bold;
    transition:.18s;
}

.mainBtn{
    width:240px;
    padding:16px;
    font-size:18px;
    border-radius:18px;

    background:
    linear-gradient(
    135deg,
    #f59e0b,
    #ef4444);

    box-shadow:
    0 10px 25px
    rgba(239,68,68,.35);
}

.mainBtn:active{
    transform:scale(.96);
}

/* HUD */

.hud{
    position:fixed;
    top:12px;
    left:12px;

    color:white;

    background:
    rgba(255,255,255,.08);

    backdrop-filter:
    blur(16px);

    padding:14px 18px;

    border-radius:18px;

    line-height:1.7;

    font-size:18px;

    z-index:20;

    min-width:160px;

    box-shadow:
    0 0 25px
    rgba(255,255,255,.08);
}

/* MENU BUTTON */

#menuBtn{
    margin-top:10px;
    width:100%;
    padding:10px;
    border-radius:12px;

    background:
    linear-gradient(
    135deg,
    #2563eb,
    #06b6d4);

    font-size:16px;
}

/* WIN */

#win{
    position:fixed;
    inset:0;

    background:
    rgba(0,0,0,.92);

    display:none;

    justify-content:center;
    align-items:center;
    flex-direction:column;

    gap:25px;

    z-index:200;

    color:white;

    font-size:
    clamp(34px,6vw,62px);

    text-shadow:
    0 0 25px white;
}

/* CANVAS */

canvas{
    display:block;

    border-radius:22px;

    image-rendering:auto;

    filter:
    drop-shadow(
    0 0 35px
    rgba(255,140,0,.2));
}

/* MOBILE */

@media(max-width:700px){

    .hud{

        top:auto;
        bottom:10px;

        left:50%;
        transform:translateX(-50%);

        width:92%;

        text-align:center;

        font-size:15px;

        padding:10px 12px;

        border-radius:16px;
    }

    #menuBtn{
        margin-top:8px;
        padding:9px;
        font-size:15px;
    }

    .mainBtn{
        width:85vw;
        max-width:320px;
        font-size:17px;
    }

    .title{
        font-size:34px;
        text-align:center;
    }

}

</style>
</head>

<body>

<!-- MENU -->

<div id="menu">

    <div class="title">
        ⚫ CHECKERS PRO ⚪
    </div>

    <!-- MAIN MENU -->

    <div id="mainMenu"
    style="
    display:flex;
    flex-direction:column;
    gap:15px;">

        <button
        class="mainBtn"
        onclick="openColorMenu('pvp')">

        👥 1 vs 1

        </button>

        <button
        class="mainBtn"
        onclick="openColorMenu('ai')">

        🤖 vs Robot

        </button>

    </div>

    <!-- COLOR MENU -->

    <div id="colorMenu"
    style="
    display:none;
    flex-direction:column;
    gap:15px;">

        <h2 style="color:white">
            Choose Color
        </h2>

        <button
        class="mainBtn"
        onclick="startGame('white')">

        ⚪ Play White

        </button>

        <button
        class="mainBtn"
        onclick="startGame('black')">

        ⚫ Play Black

        </button>

    </div>

</div>

<!-- HUD -->

<div class="hud">

    Turn:
    <span id="turn">White</span>

    <br>

    ⚪ White:
    <span id="wscore">0</span>

    <br>

    ⚫ Black:
    <span id="bscore">0</span>

    <button
    id="menuBtn"
    onclick="backMenu()">

    🏠 Menu

    </button>

</div>

<!-- WIN -->

<div id="win"></div>

<!-- GAME -->

<div id="gameWrap">

<canvas id="game"></canvas>

</div>

<script>

/* CANVAS */

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

/* HIGH FPS */

const DPR =
Math.min(
window.devicePixelRatio || 1,
2
);

/* PERFECT MOBILE SIZE */

let boardSize =
Math.min(
window.innerWidth,
window.innerHeight
);

if(window.innerWidth < 700){

    boardSize *= 0.92;

}else{

    boardSize *= 0.82;

}

canvas.width =
boardSize * DPR;

canvas.height =
boardSize * DPR;

canvas.style.width =
boardSize + "px";

canvas.style.height =
boardSize + "px";

ctx.scale(DPR,DPR);

const TILE =
boardSize / 8;

/* GAME */

let board = [];

let selected = null;

let turn = "white";

let mode = "pvp";

let playerColor = "white";

let wScore = 0;
let bScore = 0;

let gameOver = false;

/* INIT */

function init(){

    board = [];

    wScore = 0;
    bScore = 0;

    updateScore();

    for(let y=0;y<8;y++){

        for(let x=0;x<8;x++){

            let piece = null;

            if((x+y)%2===1){

                if(y<3){

                    piece = {
                        color:"black",
                        king:false
                    };

                }

                if(y>4){

                    piece = {
                        color:"white",
                        king:false
                    };

                }

            }

            board.push({
                x,
                y,
                piece
            });

        }

    }

}

/* MENU */

function openColorMenu(m){

    mode = m;

    document.getElementById(
    "mainMenu"
    ).style.display="none";

    document.getElementById(
    "colorMenu"
    ).style.display="flex";

}

function backMenu(){

    location.reload();

}

/* START */

function startGame(color){

    playerColor = color;

    document.getElementById(
    "menu"
    ).style.display="none";

    init();

    turn = "white";

    document.getElementById(
    "turn"
    ).innerText = "White";

    if(
        mode==="ai" &&
        playerColor==="black"
    ){

        setTimeout(aiMove,450);

    }

}

/* SCORE */

function updateScore(){

    document.getElementById(
    "wscore"
    ).innerText = wScore;

    document.getElementById(
    "bscore"
    ).innerText = bScore;

}

/* GET */

function get(x,y){

    return board.find(
    c=>c.x===x && c.y===y
    );

}

/* MOVES */

function getMoves(cell){

    let moves = [];

    if(!cell.piece) return moves;

    let dirs =
    cell.piece.king
    ?
    [[1,1],[-1,1],[1,-1],[-1,-1]]
    :
    (
        cell.piece.color==="white"
        ?
        [[1,-1],[-1,-1]]
        :
        [[1,1],[-1,1]]
    );

    dirs.forEach(d=>{

        let nx =
        cell.x+d[0];

        let ny =
        cell.y+d[1];

        let jx =
        cell.x+d[0]*2;

        let jy =
        cell.y+d[1]*2;

        let n = get(nx,ny);

        let j = get(jx,jy);

        if(n && !n.piece){

            moves.push({
                type:"move",
                cell:n
            });

        }

        if(
            n &&
            n.piece &&
            n.piece.color!==cell.piece.color
        ){

            if(j && !j.piece){

                moves.push({
                    type:"jump",
                    cell:j,
                    kill:n
                });

            }

        }

    });

    return moves;

}

/* ANIMATION */

function animate(
fromCell,
toCell,
move,
callback
){

    let piece =
    fromCell.piece;

    let startX =
    fromCell.x;

    let startY =
    fromCell.y;

    let endX =
    toCell.x;

    let endY =
    toCell.y;

    let t = 0;

    piece.animX = startX;
    piece.animY = startY;

    function step(){

        t += 0.055;

        if(t >= 1){

            piece.animX = null;
            piece.animY = null;

            movePiece(
            fromCell,
            toCell,
            move
            );

            callback();

            return;

        }

        piece.animX =
        startX + (endX-startX)*t;

        piece.animY =
        startY + (endY-startY)*t;

        requestAnimationFrame(step);

    }

    requestAnimationFrame(step);

}

/* MOVE */

function movePiece(
from,
to,
move
){

    to.piece =
    from.piece;

    from.piece =
    null;

    if(move.type==="jump"){

        move.kill.piece =
        null;

        if(
        to.piece.color==="white"
        ){

            wScore++;

        }else{

            bScore++;

        }

        updateScore();

    }

    if(
    to.y===0 &&
    to.piece.color==="white"
    ){

        to.piece.king=true;

    }

    if(
    to.y===7 &&
    to.piece.color==="black"
    ){

        to.piece.king=true;

    }

}

/* WIN */

function checkWin(){

    let white =
    board.filter(c=>
    c.piece &&
    c.piece.color==="white"
    ).length;

    let black =
    board.filter(c=>
    c.piece &&
    c.piece.color==="black"
    ).length;

    if(white===0){

        showWin(
        "⚫ BLACK WINS!"
        );

    }

    if(black===0){

        showWin(
        "⚪ WHITE WINS!"
        );

    }

}

/* SHOW WIN */

function showWin(text){

    gameOver = true;

    let win =
    document.getElementById("win");

    win.style.display="flex";

    win.innerHTML = `

    <div>${text}</div>

    <button
    class="mainBtn"
    onclick="location.reload()">

    🔄 Restart

    </button>

    `;

}

/* DRAW */

function draw(){

    ctx.clearRect(
    0,
    0,
    boardSize,
    boardSize
    );

    /* BOARD */

    for(let y=0;y<8;y++){

        for(let x=0;x<8;x++){

            let px =
            x*TILE;

            let py =
            y*TILE;

            let dark =
            (x+y)%2;

            let grad =
            ctx.createLinearGradient(
            px,
            py,
            px+TILE,
            py+TILE
            );

            if(dark){

                grad.addColorStop(
                0,
                "#78350f"
                );

                grad.addColorStop(
                1,
                "#431407"
                );

            }else{

                grad.addColorStop(
                0,
                "#fcd34d"
                );

                grad.addColorStop(
                1,
                "#f59e0b"
                );

            }

            ctx.fillStyle =
            grad;

            ctx.fillRect(
            px,
            py,
            TILE,
            TILE
            );

        }

    }

    /* MOVE ZONES */

    if(selected){

        getMoves(selected)
        .forEach(m=>{

            ctx.fillStyle =
            "rgba(0,255,120,.35)";

            ctx.fillRect(
            m.cell.x*TILE,
            m.cell.y*TILE,
            TILE,
            TILE
            );

        });

    }

    /* PIECES */

    board.forEach(c=>{

        if(!c.piece) return;

        let px =
        (c.piece.animX ?? c.x)
        *TILE + TILE/2;

        let py =
        (c.piece.animY ?? c.y)
        *TILE + TILE/2;

        /* SHADOW */

        ctx.beginPath();

        ctx.fillStyle =
        "rgba(0,0,0,.4)";

        ctx.ellipse(
        px,
        py+7,
        TILE*0.28,
        TILE*0.12,
        0,
        0,
        Math.PI*2
        );

        ctx.fill();

        /* 3D */

        let grad =
        ctx.createRadialGradient(
        px-TILE*.1,
        py-TILE*.1,
        5,
        px,
        py,
        TILE*.45
        );

        if(
        c.piece.color==="white"
        ){

            grad.addColorStop(
            0,
            "#ffffff"
            );

            grad.addColorStop(
            .4,
            "#f8fafc"
            );

            grad.addColorStop(
            1,
            "#94a3b8"
            );

        }else{

            grad.addColorStop(
            0,
            "#6b7280"
            );

            grad.addColorStop(
            .5,
            "#111827"
            );

            grad.addColorStop(
            1,
            "#000"
            );

        }

        ctx.beginPath();

        ctx.fillStyle =
        grad;

        ctx.shadowBlur = 22;

        ctx.shadowColor =
        c.piece.color==="white"
        ?
        "#fff"
        :
        "#000";

        ctx.arc(
        px,
        py,
        TILE*.33,
        0,
        Math.PI*2
        );

        ctx.fill();

        ctx.shadowBlur = 0;

        /* LIGHT */

        ctx.beginPath();

        ctx.fillStyle =
        "rgba(255,255,255,.25)";

        ctx.arc(
        px-TILE*.08,
        py-TILE*.08,
        TILE*.07,
        0,
        Math.PI*2
        );

        ctx.fill();

        /* KING */

        if(c.piece.king){

            ctx.font =
            TILE*.25 + "px Arial";

            ctx.fillText(
            "👑",
            px-TILE*.11,
            py+TILE*.08
            );

        }

    });

}

/* CLICK */

canvas.addEventListener(
"click",
e=>{

    if(gameOver) return;

    if(
    mode==="ai" &&
    turn!==playerColor
    ){
        return;
    }

    let rect =
    canvas.getBoundingClientRect();

    let x =
    Math.floor(
    (e.clientX-rect.left)/TILE
    );

    let y =
    Math.floor(
    (e.clientY-rect.top)/TILE
    );

    let cell =
    get(x,y);

    if(selected){

        let moves =
        getMoves(selected);

        let move =
        moves.find(
        m=>m.cell===cell
        );

        if(move){

            animate(
            selected,
            cell,
            move,

            ()=>{

                selected = null;

                turn =
                turn==="white"
                ?
                "black"
                :
                "white";

                document.getElementById(
                "turn"
                ).innerText =

                turn.charAt(0)
                .toUpperCase()

                + turn.slice(1);

                checkWin();

                if(
                mode==="ai" &&
                turn!==playerColor
                ){

                    setTimeout(
                    aiMove,
                    400
                    );

                }

            });

        }else{

            selected = null;

        }

    }else if(

        cell &&
        cell.piece &&
        cell.piece.color===turn &&

        (
        mode==="pvp" ||

        cell.piece.color===
        playerColor
        )

    ){

        selected = cell;

    }

});

/* AI */

function aiMove(){

    if(gameOver) return;

    let aiColor =
    playerColor==="white"
    ?
    "black"
    :
    "white";

    let pieces =
    board.filter(c=>

    c.piece &&

    c.piece.color===aiColor

    );

    let all = [];

    pieces.forEach(p=>{

        getMoves(p)
        .forEach(m=>{

            all.push({
                p,
                m
            });

        });

    });

    if(all.length===0){

        showWin(
        playerColor==="white"
        ?
        "⚪ WHITE WINS!"
        :
        "⚫ BLACK WINS!"
        );

        return;

    }

    let jumps =
    all.filter(
    a=>a.m.type==="jump"
    );

    let chosen =
    (jumps.length
    ?
    jumps
    :
    all)

    [

    Math.floor(

    Math.random()*

    (
    jumps.length
    ?
    jumps.length
    :
    all.length
    )

    )

    ];

    animate(

    chosen.p,

    chosen.m.cell,

    chosen.m,

    ()=>{

        turn =
        playerColor;

        document.getElementById(
        "turn"
        ).innerText =

        turn.charAt(0)
        .toUpperCase()

        + turn.slice(1);

        checkWin();

    });

}

/* LOOP */

function loop(){

    draw();

    requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>

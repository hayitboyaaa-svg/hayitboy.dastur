<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast Translate AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e1b4b);
    padding:10px;
}

.app{
    width:100%;
    max-width:950px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border-radius:22px;
    padding:14px;
    border:1px solid rgba(255,255,255,0.1);
}

.title{
    text-align:center;
    color:white;
    font-size:18px;
    margin-bottom:10px;
}

.top{
    display:flex;
    gap:8px;
    margin-bottom:10px;
}

select{
    flex:1;
    height:38px;
    border:none;
    border-radius:10px;
    background:#111827;
    color:white;
    padding:5px;
}

.swap{
    width:38px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#8b5cf6,#2563eb);
    color:white;
    cursor:pointer;
}

.translator{
    display:flex;
    gap:10px;
}

.box{
    flex:1;
    background:#020617;
    border-radius:16px;
    padding:10px;
}

textarea{
    width:100%;
    height:200px;
    background:transparent;
    border:none;
    outline:none;
    color:white;
    font-size:14px;
    resize:none;
}

.actions{
    display:flex;
    justify-content:flex-end;
    gap:6px;
    margin-top:6px;
}

.icon{
    width:34px;
    height:34px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.1);
    color:white;
    cursor:pointer;
}

.icon:hover{
    background:rgba(255,255,255,0.2);
}

</style>
</head>

<body>

<div class="app">

<div class="title">⚡ Fast Translate AI</div>

<div class="top">

<select id="fromLang"></select>

<button class="swap" onclick="swapLang()">⇄</button>

<select id="toLang"></select>

</div>

<div class="translator">

<!-- LEFT -->
<div class="box">

<textarea id="inputText" placeholder="Type..."></textarea>

<div class="actions">
<button class="icon" onclick="copyText('inputText')">📋</button>
<button class="icon" onclick="speakFast('inputText','fromLang')">🔊</button>
</div>

</div>

<!-- RIGHT -->
<div class="box">

<textarea id="outputText" readonly placeholder="Translation..."></textarea>

<div class="actions">
<button class="icon" onclick="copyText('outputText')">📋</button>
<button class="icon" onclick="speakFast('outputText','toLang')">🔊</button>
</div>

</div>

</div>

</div>

<script>

const langs = {
"uz":"Uzbek","en":"English","ru":"Russian","tr":"Turkish",
"ja":"Japanese","ko":"Korean","fr":"French","de":"German",
"es":"Spanish","ar":"Arabic","hi":"Hindi","zh":"Chinese"
};

const fromLang = document.getElementById("fromLang");
const toLang = document.getElementById("toLang");
const inputText = document.getElementById("inputText");
const outputText = document.getElementById("outputText");

for(let i in langs){
    fromLang.innerHTML += `<option value="${i}">${langs[i]}</option>`;
    toLang.innerHTML += `<option value="${i}">${langs[i]}</option>`;
}

fromLang.value = "uz";
toLang.value = "en";

let timer;

// ⚡ FAST AUTO TRANSLATE
async function translateText(){

    const text = inputText.value.trim();
    if(!text){
        outputText.value = "";
        return;
    }

    try{

        const url =
`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${fromLang.value}&tl=${toLang.value}&dt=t&q=${encodeURIComponent(text)}`;

        const res = await fetch(url);
        const data = await res.json();

        outputText.value = data[0].map(x => x[0]).join("");

    }catch{
        outputText.value = "Error";
    }
}

// typing speed optimized
inputText.addEventListener("input", ()=>{

    clearTimeout(timer);

    timer = setTimeout(()=>{
        translateText();
    },200); // 🔥 faster

});

// language change auto
fromLang.onchange = translateText;
toLang.onchange = translateText;

// swap
function swapLang(){

    let t = fromLang.value;
    fromLang.value = toLang.value;
    toLang.value = t;

    translateText();
}

// copy
function copyText(id){
    navigator.clipboard.writeText(
        document.getElementById(id).value
    );
}

// 🔊 VERY FAST SPEECH (no queue lag)
function speakFast(id,langId){

    const text = document.getElementById(id).value;
    if(!text) return;

    // stop previous speech instantly
    speechSynthesis.cancel();

    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = document.getElementById(langId).value;
    speech.rate = 1.2; // 🔥 faster voice
    speech.pitch = 1;

    speechSynthesis.speak(speech);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Checkers PRO</title>

<style>

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    overflow:hidden;
    font-family:sans-serif;
    background:
    radial-gradient(circle at top,#1e293b,#020617);
}

/* MENU */
#menu{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:18px;
    background:rgba(0,0,0,.92);
    z-index:50;
}

.title{
    color:white;
    font-size:42px;
    font-weight:bold;
    text-shadow:0 0 25px orange;
}

button{
    padding:14px 30px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
    color:white;
    background:
    linear-gradient(135deg,#f59e0b,#ef4444);

    box-shadow:
    0 0 20px rgba(239,68,68,.4);

    transition:.2s;
}

button:hover{
    transform:scale(1.05);
}

.hud{
    position:fixed;
    bottom:12px;
    left:12px;
    color:white;
    background:rgba(255,255,255,.08);
    padding:12px 16px;
    border-radius:16px;
    backdrop-filter:blur(12px);
    line-height:1.7;
    font-size:16px;
    z-index:20;
    box-shadow:
    0 0 20px rgba(0,0,0,.3);
}

#menuBtn{
    position:fixed;
    bottom:12px;
    right:12px;
    z-index:30;
    border:none;
    border-radius:16px;
    padding:14px 18px;
    font-size:17px;
    font-weight:bold;
    color:white;
    background:
    linear-gradient(
        135deg,
        #f59e0b,
        #ef4444
    );
    box-shadow:
    0 0 20px rgba(0,0,0,.35);
    cursor:pointer;
}

#win{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.92);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    z-index:60;
    font-size:52px;
    text-shadow:0 0 20px white;
    gap:25px;
}

canvas{
    display:block;
    margin:auto;
    image-rendering:auto;
    filter:
    drop-shadow(
    0 0 40px rgba(255,140,0,.25));
}

@media(max-width:768px){

    .title{
        font-size:30px;
        text-align:center;
    }

    button{
        font-size:16px;
        padding:12px 22px;
    }

    .hud{
        font-size:14px;
        padding:10px 14px;
        max-width:150px;
    }

    #menuBtn{
        font-size:15px;
        padding:12px 15px;
    }

    #win{
        font-size:32px;
        text-align:center;
        padding:20px;
    }

}

</style>
</head>

<body>

<div id="menu">

    <div class="title">
        ⚫ CHECKERS PRO ⚪
    </div>

    <div id="mainMenu"
    style="display:flex;
    flex-direction:column;
    gap:15px;">

        <button onclick="openColorMenu('pvp')">
            👥 1 vs 1
        </button>

        <button onclick="openDifficultyMenu()">
            🤖 vs Robot
        </button>

    </div>

    <div id="difficultyMenu"
    style="display:none;
    flex-direction:column;
    gap:15px;">

        <h2 style="color:white">
            Choose Difficulty
        </h2>

        <button onclick="setDifficulty('easy')">
            🟢 Easy
        </button>

        <button onclick="setDifficulty('hard')">
            🟠 Hard
        </button>

        <button onclick="setDifficulty('impossible')">
            🔴 Impossible
        </button>

    </div>

    <div id="colorMenu"
    style="display:none;
    flex-direction:column;
    gap:15px;">

        <h2 style="color:white">
            Choose Color
        </h2>

        <button onclick="startGame('white')">
            ⚪ Play White
        </button>

        <button onclick="startGame('black')">
            ⚫ Play Black
        </button>

    </div>

</div>

<div class="hud">

    Turn:
    <span id="turn">White</span>

    <br>

    ⚪ White:
    <span id="wscore">0</span>

    <br>

    ⚫ Black:
    <span id="bscore">0</span>

</div>

<button id="menuBtn"
onclick="location.reload()">
☰ Menu
</button>

<div id="win"></div>

<canvas id="game"></canvas>

<script>

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

const DPR =
Math.min(
window.devicePixelRatio || 1,
2
);

let size =
Math.min(innerWidth,innerHeight)*0.92;

canvas.width = size * DPR;
canvas.height = size * DPR;

canvas.style.width = size+"px";
canvas.style.height = size+"px";

ctx.scale(DPR,DPR);

const TILE = size/8;

let board = [];
let selected = null;

let turn = "white";
let mode = "pvp";
let playerColor = "white";

let aiLevel = "easy";

let wScore = 0;
let bScore = 0;

let gameOver = false;

/* INIT */
function init(){

    board=[];

    wScore=0;
    bScore=0;

    updateScore();

    for(let y=0;y<8;y++){

        for(let x=0;x<8;x++){

            let piece=null;

            if((x+y)%2===1){

                if(y<3){

                    piece={
                        color:"black",
                        king:false
                    };

                }

                if(y>4){

                    piece={
                        color:"white",
                        king:false
                    };

                }

            }

            board.push({
                x,
                y,
                piece
            });

        }

    }

}

/* GET */
function get(x,y){

    return board.find(
    c=>c.x===x && c.y===y);

}

/* MENU */
function openColorMenu(m){

    mode=m;

    document.getElementById(
    "mainMenu").style.display="none";

    document.getElementById(
    "colorMenu").style.display="flex";

}

/* OPEN AI LEVEL MENU */
function openDifficultyMenu(){

    mode="ai";

    document.getElementById(
    "mainMenu").style.display="none";

    document.getElementById(
    "difficultyMenu").style.display="flex";

}

/* SET LEVEL */
function setDifficulty(level){

    aiLevel=level;

    document.getElementById(
    "difficultyMenu").style.display="none";

    document.getElementById(
    "colorMenu").style.display="flex";

}

/* START */
function startGame(color){

    playerColor=color;

    document.getElementById(
    "menu").style.display="none";

    init();

    turn="white";

    document.getElementById(
    "turn").innerText="White";

    if(
        mode==="ai" &&
        playerColor==="black"
    ){

        setTimeout(aiMove,400);

    }

}

/* SCORE */
function updateScore(){

    document.getElementById(
    "wscore").innerText=wScore;

    document.getElementById(
    "bscore").innerText=bScore;

}

/* MOVES */
function getMoves(cell){

    let moves=[];

    if(!cell.piece) return moves;

    /* DAMKA */
    if(cell.piece.king){

        let dirs=[
            [1,1],
            [-1,1],
            [1,-1],
            [-1,-1]
        ];

        dirs.forEach(d=>{

            let x=cell.x+d[0];
            let y=cell.y+d[1];

            let enemy=null;

            while(true){

                let n=get(x,y);

                if(!n) break;

                if(!n.piece){

                    if(!enemy){

                        moves.push({
                            type:"move",
                            cell:n
                        });

                    }else{

                        moves.push({
                            type:"jump",
                            cell:n,
                            kill:enemy
                        });

                    }

                }else{

                    if(
                        n.piece.color===
                        cell.piece.color
                    ){
                        break;
                    }

                    if(enemy) break;

                    enemy=n;

                }

                x+=d[0];
                y+=d[1];

            }

        });

        return moves;

    }

    /* ODDIY SHASHKA */

    /* OLDINGA YURADI */
    let moveDirs=
    cell.piece.color==="white"
    ?
    [[1,-1],[-1,-1]]
    :
    [[1,1],[-1,1]];

    /* ORQAGA HAM URA OLADI */
    let jumpDirs=[
        [1,1],
        [-1,1],
        [1,-1],
        [-1,-1]
    ];

    /* YURISH */
    moveDirs.forEach(d=>{

        let nx=cell.x+d[0];
        let ny=cell.y+d[1];

        let n=get(nx,ny);

        if(n && !n.piece){

            moves.push({
                type:"move",
                cell:n
            });

        }

    });

    /* URISH */
    jumpDirs.forEach(d=>{

        let nx=cell.x+d[0];
        let ny=cell.y+d[1];

        let jx=cell.x+d[0]*2;
        let jy=cell.y+d[1]*2;

        let n=get(nx,ny);
        let j=get(jx,jy);

        if(
            n &&
            n.piece &&
            n.piece.color!==cell.piece.color
        ){

            if(j && !j.piece){

                moves.push({
                    type:"jump",
                    cell:j,
                    kill:n
                });

            }

        }

    });

    return moves;

}

/* AI SCORE */
function evaluateMove(p,m){

    let score=0;

    if(m.type==="jump"){
        score+=50;
    }

    if(m.cell.y===0 || m.cell.y===7){
        score+=25;
    }

    if(p.piece.king){
        score+=20;
    }

    score+=Math.random()*5;

    return score;

}

/* ANIMATE */
function animate(fromCell,toCell,move,callback){

    let piece=fromCell.piece;

    let startX=fromCell.x;
    let startY=fromCell.y;

    let endX=toCell.x;
    let endY=toCell.y;

    let t=0;

    piece.animX=startX;
    piece.animY=startY;

    function step(){

        t += 0.075;

        if(t>=1){

            piece.animX=null;
            piece.animY=null;

            movePiece(
                fromCell,
                toCell,
                move
            );

            callback();

            return;

        }

        piece.animX=
        startX+(endX-startX)*t;

        piece.animY=
        startY+(endY-startY)*t;

        requestAnimationFrame(step);

    }

    step();

}

/* MOVE */
function movePiece(from,to,move){

    to.piece=from.piece;

    from.piece=null;

    if(move.type==="jump"){

        move.kill.piece=null;

        if(to.piece.color==="white"){

            wScore++;

        }else{

            bScore++;

        }

        updateScore();

    }

    if(
        to.y===0 &&
        to.piece.color==="white"
    ){

        to.piece.king=true;

    }

    if(
        to.y===7 &&
        to.piece.color==="black"
    ){

        to.piece.king=true;

    }

}

/* WIN */
function checkWin(){

    let white=
    board.filter(c=>
    c.piece &&
    c.piece.color==="white").length;

    let black=
    board.filter(c=>
    c.piece &&
    c.piece.color==="black").length;

    if(white===0){

        showWin(
        "⚫ BLACK WINS!");

    }

    if(black===0){

        showWin(
        "⚪ WHITE WINS!");

    }

}

/* SHOW WIN */
function showWin(text){

    gameOver=true;

    let win=
    document.getElementById("win");

    win.style.display="flex";

    win.innerHTML=`
    <div>${text}</div>

    <button onclick="location.reload()">
    🔄 Restart
    </button>
    `;

}

/* BOARD ROTATE */
function boardX(x){

    return playerColor==="black"
    ? 7 - x
    : x;

}

function boardY(y){

    return playerColor==="black"
    ? 7 - y
    : y;

}

/* DRAW */
function draw(){

    for(let y=0;y<8;y++){

        for(let x=0;x<8;x++){

            let drawX = boardX(x);
            let drawY = boardY(y);

            let px=drawX*TILE;
            let py=drawY*TILE;

            let dark=(x+y)%2;

            let grad=
            ctx.createLinearGradient(
            px,py,
            px+TILE,
            py+TILE);

            if(dark){

                grad.addColorStop(0,"#78350f");
                grad.addColorStop(1,"#431407");

            }else{

                grad.addColorStop(0,"#fcd34d");
                grad.addColorStop(1,"#f59e0b");

            }

            ctx.fillStyle=grad;

            ctx.fillRect(
            px,py,TILE,TILE);

        }

    }

    if(selected){

        getMoves(selected).forEach(m=>{

            ctx.fillStyle=
            "rgba(0,255,120,.35)";

            ctx.fillRect(
            boardX(m.cell.x)*TILE,
            boardY(m.cell.y)*TILE,
            TILE,
            TILE);

        });

    }

    board.forEach(c=>{

        if(!c.piece) return;

        let drawX =
        boardX(c.piece.animX ?? c.x);

        let drawY =
        boardY(c.piece.animY ?? c.y);

        let px=
        drawX*TILE + TILE/2;

        let py=
        drawY*TILE + TILE/2;

        ctx.beginPath();

        ctx.fillStyle=
        "rgba(0,0,0,.4)";

        ctx.ellipse(
        px,
        py+8,
        TILE*0.28,
        TILE*0.12,
        0,
        0,
        Math.PI*2);

        ctx.fill();

        let grad=
        ctx.createRadialGradient(
        px-TILE*.1,
        py-TILE*.12,
        5,
        px,
        py,
        TILE*.45);

        if(c.piece.color==="white"){

            grad.addColorStop(0,"#fff");
            grad.addColorStop(1,"#94a3b8");

        }else{

            grad.addColorStop(0,"#6b7280");
            grad.addColorStop(1,"#000");

        }

        ctx.beginPath();

        ctx.fillStyle=grad;

        ctx.shadowBlur=25;

        ctx.shadowColor=
        c.piece.color==="white"
        ?
        "#fff"
        :
        "#000";

        ctx.arc(
        px,
        py,
        TILE*.33,
        0,
        Math.PI*2);

        ctx.fill();

        ctx.shadowBlur=0;

        if(c.piece.king){

            ctx.font=
            TILE*.25+"px Arial";

            ctx.fillText(
            "👑",
            px-TILE*.12,
            py+TILE*.08);

        }

    });

}

/* CLICK */
canvas.addEventListener("click",(e)=>{

    if(gameOver) return;

    if(
        mode==="ai" &&
        turn!==playerColor
    ){
        return;
    }

    let rect=
    canvas.getBoundingClientRect();

    let x=Math.floor(
    (e.clientX-rect.left)/TILE);

    let y=Math.floor(
    (e.clientY-rect.top)/TILE);

    if(playerColor==="black"){

        x = 7 - x;
        y = 7 - y;

    }

    let cell=get(x,y);

    if(selected){

        let moves=
        getMoves(selected);

        let move=
        moves.find(
        m=>m.cell===cell);

        if(move){

            animate(
            selected,
            cell,
            move,
            ()=>{

                selected=null;

                turn=
                turn==="white"
                ?
                "black"
                :
                "white";

                document.getElementById(
                "turn").innerText=
                turn.charAt(0)
                .toUpperCase()
                + turn.slice(1);

                checkWin();

                if(
                    mode==="ai" &&
                    turn!==playerColor
                ){

                    setTimeout(
                    aiMove,
                    350);

                }

            });

        }else{

            selected=null;

        }

    }else if(

        cell &&
        cell.piece &&
        cell.piece.color===turn &&

        (
            mode==="pvp" ||
            cell.piece.color===playerColor
        )

    ){

        selected=cell;

    }

});

/* AI */
function aiMove(){

    if(gameOver) return;

    let aiColor=
    playerColor==="white"
    ?
    "black"
    :
    "white";

    let pieces=
    board.filter(c=>
    c.piece &&
    c.piece.color===aiColor);

    let all=[];

    pieces.forEach(p=>{

        getMoves(p).forEach(m=>{

            all.push({
                p,
                m,
                score:evaluateMove(p,m)
            });

        });

    });

    if(all.length===0){

        showWin(
        playerColor==="white"
        ?
        "⚪ WHITE WINS!"
        :
        "⚫ BLACK WINS!");

        return;

    }

    let chosen;

    if(aiLevel==="easy"){

        chosen=
        all[
            Math.floor(
            Math.random()*all.length
            )
        ];

    }

    if(aiLevel==="hard"){

        all.sort(
        (a,b)=>b.score-a.score);

        chosen=all[0];

    }

    if(aiLevel==="impossible"){

        let jumps=
        all.filter(
        a=>a.m.type==="jump");

        if(jumps.length){

            jumps.sort(
            (a,b)=>b.score-a.score);

            chosen=jumps[0];

        }else{

            all.sort(
            (a,b)=>b.score-a.score);

            chosen=all[0];

        }

    }

    animate(
    chosen.p,
    chosen.m.cell,
    chosen.m,
    ()=>{

        turn=playerColor;

        document.getElementById(
        "turn").innerText=
        turn.charAt(0)
        .toUpperCase()
        + turn.slice(1);

        checkWin();

    });

}

/* LOOP */
function loop(){

    ctx.clearRect(
    0,0,size,size);

    draw();

    requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>

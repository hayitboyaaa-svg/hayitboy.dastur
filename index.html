<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkers PRO</title>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:sans-serif;
    background:
    radial-gradient(circle at top,#1e293b,#020617);
}

/* MENU */
#menu{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:18px;
    background:rgba(0,0,0,.92);
    z-index:10;
}

.title{
    color:white;
    font-size:42px;
    font-weight:bold;
    text-shadow:0 0 25px orange;
}

button{
    padding:14px 30px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
    color:white;
    background:
    linear-gradient(135deg,#f59e0b,#ef4444);
    box-shadow:0 0 20px rgba(239,68,68,.4);
    transition:.2s;
}

button:hover{
    transform:scale(1.05);
}

/* HUD */
.hud{
    position:fixed;
    top:10px;
    left:10px;
    color:white;
    background:rgba(255,255,255,.06);
    padding:14px 18px;
    border-radius:14px;
    backdrop-filter:blur(10px);
    line-height:1.8;
    font-size:18px;
    z-index:50;
}

/* MOBILE FIX */
@media(max-width:700px){

    .hud{
        top:auto;
        bottom:10px;
        left:50%;
        transform:translateX(-50%);
        font-size:15px;
        padding:10px 14px;
        line-height:1.5;
        white-space:nowrap;
    }

    .title{
        font-size:32px;
    }

    button{
        font-size:16px;
        padding:12px 22px;
    }

}

/* WIN */
#win{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.92);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    z-index:20;
    font-size:52px;
    text-shadow:0 0 20px white;
    gap:25px;
}

/* 4K CANVAS */
canvas{
    display:block;
    margin:auto;
    image-rendering:auto;
    filter:
    drop-shadow(0 0 40px rgba(255,140,0,.25));
}

</style>
</head>

<body>

<!-- MENU -->
<div id="menu">

    <div class="title">
        ⚫ CHECKERS PRO ⚪
    </div>

    <!-- MAIN MENU -->
    <div id="mainMenu"
    style="display:flex; flex-direction:column; gap:15px;">

        <button onclick="openColorMenu('pvp')">
            👥 1 vs 1
        </button>

        <button onclick="openColorMenu('ai')">
            🤖 vs Robot
        </button>

    </div>

    <!-- COLOR MENU -->
    <div id="colorMenu"
    style="display:none; flex-direction:column; gap:15px;">

        <h2 style="color:white">
            Choose Color
        </h2>

        <button onclick="startGame('white')">
            ⚪ Play White
        </button>

        <button onclick="startGame('black')">
            ⚫ Play Black
        </button>

    </div>

</div>

<!-- HUD -->
<div class="hud">

    Turn:
    <span id="turn">White</span>

    <br>

    ⚪ White:
    <span id="wscore">0</span>

    <br>

    ⚫ Black:
    <span id="bscore">0</span>

</div>

<!-- WIN -->
<div id="win"></div>

<!-- GAME -->
<canvas id="game"></canvas>

<script>

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

/* 4K + HIGH FPS */
const DPR =
Math.min(
window.devicePixelRatio || 1,
2
);

let size =
Math.min(innerWidth,innerHeight)*0.9;

canvas.width = size * DPR;
canvas.height = size * DPR;

canvas.style.width = size + "px";
canvas.style.height = size + "px";

ctx.scale(DPR,DPR);

const TILE = size/8;

let board = [];
let selected = null;

let turn = "white";
let mode = "pvp";
let playerColor = "white";

let wScore = 0;
let bScore = 0;

let gameOver = false;

// INIT
function init(){

    board = [];

    wScore = 0;
    bScore = 0;

    updateScore();

    for(let y=0;y<8;y++){

        for(let x=0;x<8;x++){

            let piece = null;

            if((x+y)%2===1){

                if(y<3){

                    piece = {
                        color:"black",
                        king:false
                    };

                }

                if(y>4){

                    piece = {
                        color:"white",
                        king:false
                    };

                }

            }

            board.push({
                x,
                y,
                piece
            });

        }

    }

}

// GET CELL
function get(x,y){

    return board.find(
        c=>c.x===x && c.y===y
    );

}

// MENU
function openColorMenu(m){

    mode = m;

    document.getElementById(
        "mainMenu"
    ).style.display="none";

    document.getElementById(
        "colorMenu"
    ).style.display="flex";

}

// START GAME
function startGame(color){

    playerColor = color;

    document.getElementById(
        "menu"
    ).style.display="none";

    init();

    turn = "white";

    document.getElementById(
        "turn"
    ).innerText = "White";

    if(
        mode==="ai" &&
        playerColor==="black"
    ){

        setTimeout(()=>{
            aiMove();
        },500);

    }

}

// SCORE
function updateScore(){

    document.getElementById(
        "wscore"
    ).innerText = wScore;

    document.getElementById(
        "bscore"
    ).innerText = bScore;

}

// MOVES
function getMoves(cell){

    let moves = [];

    if(!cell.piece) return moves;

    let dirs =
    cell.piece.king
    ?
    [[1,1],[-1,1],[1,-1],[-1,-1]]
    :
    (
        cell.piece.color==="white"
        ?
        [[1,-1],[-1,-1]]
        :
        [[1,1],[-1,1]]
    );

    dirs.forEach(d=>{

        let nx = cell.x+d[0];
        let ny = cell.y+d[1];

        let jx = cell.x+d[0]*2;
        let jy = cell.y+d[1]*2;

        let n = get(nx,ny);
        let j = get(jx,jy);

        if(n && !n.piece){

            moves.push({
                type:"move",
                cell:n
            });

        }

        if(
            n &&
            n.piece &&
            n.piece.color!==cell.piece.color
        ){

            if(j && !j.piece){

                moves.push({
                    type:"jump",
                    cell:j,
                    kill:n
                });

            }

        }

    });

    return moves;

}

// ANIMATION
function animate(fromCell,toCell,move,callback){

    let piece = fromCell.piece;

    let startX = fromCell.x;
    let startY = fromCell.y;

    let endX = toCell.x;
    let endY = toCell.y;

    let t = 0;

    piece.animX = startX;
    piece.animY = startY;

    function step(){

        t += 0.042;

        if(t >= 1){

            piece.animX = null;
            piece.animY = null;

            movePiece(
                fromCell,
                toCell,
                move
            );

            callback();

            return;
        }

        piece.animX =
        startX + (endX-startX)*t;

        piece.animY =
        startY + (endY-startY)*t;

        requestAnimationFrame(step);

    }

    step();

}

// MOVE
function movePiece(from,to,move){

    to.piece = from.piece;

    from.piece = null;

    if(move.type==="jump"){

        move.kill.piece = null;

        if(to.piece.color==="white"){

            wScore++;

        }else{

            bScore++;

        }

        updateScore();

    }

    if(
        to.y===0 &&
        to.piece.color==="white"
    ){

        to.piece.king=true;

    }

    if(
        to.y===7 &&
        to.piece.color==="black"
    ){

        to.piece.king=true;

    }

}

// WIN
function checkWin(){

    let white =
    board.filter(c=>
        c.piece &&
        c.piece.color==="white"
    ).length;

    let black =
    board.filter(c=>
        c.piece &&
        c.piece.color==="black"
    ).length;

    if(white===0){

        showWin(
            "⚫ BLACK WINS!"
        );

    }

    if(black===0){

        showWin(
            "⚪ WHITE WINS!"
        );

    }

}

// SHOW WIN
function showWin(text){

    gameOver = true;

    let win =
    document.getElementById("win");

    win.style.display="flex";

    win.innerHTML = `
        <div>${text}</div>

        <button onclick="location.reload()">
            🔄 Restart
        </button>
    `;

}

// DRAW
function draw(){

    // BACKGROUND
    let bg =
    ctx.createLinearGradient(
        0,0,size,size
    );

    bg.addColorStop(0,"#78350f");
    bg.addColorStop(1,"#1e293b");

    ctx.fillStyle = bg;

    ctx.fillRect(0,0,size,size);

    // BOARD
    for(let y=0;y<8;y++){

        for(let x=0;x<8;x++){

            let px = x*TILE;
            let py = y*TILE;

            let dark =
            (x+y)%2;

            let grad =
            ctx.createLinearGradient(
                px,
                py,
                px+TILE,
                py+TILE
            );

            if(dark){

                grad.addColorStop(0,"#78350f");
                grad.addColorStop(1,"#431407");

            }else{

                grad.addColorStop(0,"#fcd34d");
                grad.addColorStop(1,"#f59e0b");

            }

            ctx.fillStyle = grad;

            ctx.fillRect(
                px,
                py,
                TILE,
                TILE
            );

            ctx.strokeStyle =
            "rgba(255,255,255,.08)";

            ctx.lineWidth = 2;

            ctx.strokeRect(
                px,
                py,
                TILE,
                TILE
            );

        }

    }

    // GREEN MOVE CELLS
    if(selected){

        getMoves(selected).forEach(m=>{

            ctx.fillStyle =
            "rgba(0,255,120,.35)";

            ctx.fillRect(
                m.cell.x*TILE,
                m.cell.y*TILE,
                TILE,
                TILE
            );

            ctx.strokeStyle =
            "rgba(0,255,120,.9)";

            ctx.lineWidth = 3;

            ctx.strokeRect(
                m.cell.x*TILE+2,
                m.cell.y*TILE+2,
                TILE-4,
                TILE-4
            );

        });

    }

    // PIECES
    board.forEach(c=>{

        if(!c.piece) return;

        let px =
        (c.piece.animX ?? c.x)
        *TILE + TILE/2;

        let py =
        (c.piece.animY ?? c.y)
        *TILE + TILE/2;

        ctx.beginPath();

        ctx.fillStyle =
        "rgba(0,0,0,.45)";

        ctx.ellipse(
            px,
            py+8,
            TILE*0.28,
            TILE*0.12,
            0,
            0,
            Math.PI*2
        );

        ctx.fill();

        let grad =
        ctx.createRadialGradient(
            px-TILE*0.1,
            py-TILE*0.12,
            5,
            px,
            py,
            TILE*0.45
        );

        if(c.piece.color==="white"){

            grad.addColorStop(0,"#ffffff");
            grad.addColorStop(.4,"#f8fafc");
            grad.addColorStop(1,"#94a3b8");

        }else{

            grad.addColorStop(0,"#6b7280");
            grad.addColorStop(.5,"#111827");
            grad.addColorStop(1,"#000000");

        }

        ctx.beginPath();

        ctx.fillStyle = grad;

        ctx.shadowBlur = 25;

        ctx.shadowColor =
        c.piece.color==="white"
        ?
        "#ffffff"
        :
        "#000000";

        ctx.arc(
            px,
            py,
            TILE*0.33,
            0,
            Math.PI*2
        );

        ctx.fill();

        ctx.beginPath();

        ctx.fillStyle =
        "rgba(255,255,255,.28)";

        ctx.arc(
            px-TILE*0.09,
            py-TILE*0.09,
            TILE*0.08,
            0,
            Math.PI*2
        );

        ctx.fill();

        if(c.piece.king){

            ctx.font =
            TILE*0.25 + "px Arial";

            ctx.fillText(
                "👑",
                px-TILE*0.12,
                py+TILE*0.08
            );

        }

        ctx.shadowBlur = 0;

    });

}

// CLICK
canvas.addEventListener("click",(e)=>{

    if(gameOver) return;

    if(
        mode==="ai" &&
        turn!==playerColor
    ){
        return;
    }

    let rect =
    canvas.getBoundingClientRect();

    let x = Math.floor(
        (e.clientX-rect.left)/TILE
    );

    let y = Math.floor(
        (e.clientY-rect.top)/TILE
    );

    let cell = get(x,y);

    if(selected){

        let moves =
        getMoves(selected);

        let move =
        moves.find(
            m=>m.cell===cell
        );

        if(move){

            animate(
                selected,
                cell,
                move,
                ()=>{

                    selected = null;

                    turn =
                    turn==="white"
                    ?
                    "black"
                    :
                    "white";

                    document.getElementById(
                        "turn"
                    ).innerText =
                    turn.charAt(0).toUpperCase()
                    + turn.slice(1);

                    checkWin();

                    if(
                        mode==="ai" &&
                        turn!==playerColor
                    ){

                        setTimeout(
                            aiMove,
                            500
                        );

                    }

                }
            );

        }else{

            selected = null;

        }

    }else if(

        cell &&
        cell.piece &&
        cell.piece.color===turn &&

        (
            mode==="pvp" ||
            cell.piece.color===playerColor
        )

    ){

        selected = cell;

    }

});

// AI
function aiMove(){

    if(gameOver) return;

    let aiColor =
    playerColor==="white"
    ?
    "black"
    :
    "white";

    let pieces =
    board.filter(c=>
        c.piece &&
        c.piece.color===aiColor
    );

    let all = [];

    pieces.forEach(p=>{

        getMoves(p).forEach(m=>{

            all.push({
                p,
                m
            });

        });

    });

    if(all.length===0){

        showWin(
            playerColor==="white"
            ?
            "⚪ WHITE WINS!"
            :
            "⚫ BLACK WINS!"
        );

        return;

    }

    let jumps =
    all.filter(
        a=>a.m.type==="jump"
    );

    let chosen =
    (jumps.length?jumps:all)
    [
        Math.floor(
            Math.random()*
            (
                jumps.length
                ?
                jumps.length
                :
                all.length
            )
        )
    ];

    animate(
        chosen.p,
        chosen.m.cell,
        chosen.m,
        ()=>{

            turn = playerColor;

            document.getElementById(
                "turn"
            ).innerText =
            turn.charAt(0).toUpperCase()
            + turn.slice(1);

            checkWin();

        }
    );

}

// LOOP
function loop(){

    ctx.clearRect(
        0,
        0,
        size,
        size
    );

    draw();

    requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>

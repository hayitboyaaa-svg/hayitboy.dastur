<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ONLINE CHECKERS PRO</title>

<style>

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    overflow:hidden;
    font-family:sans-serif;
    background:radial-gradient(circle at top,#1e293b,#020617);
    color:white;
}

#menu{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:18px;
    background:rgba(0,0,0,.94);
    z-index:100;
}

.title{
    font-size:42px;
    font-weight:bold;
    text-shadow:0 0 25px orange;
}

button,input{
    border:none;
    outline:none;
    border-radius:16px;
    padding:14px 20px;
    font-size:18px;
}

button{
    cursor:pointer;
    color:white;
    font-weight:bold;
    background:linear-gradient(135deg,#f59e0b,#ef4444);
    box-shadow:0 0 20px rgba(239,68,68,.4);
}

input{
    width:260px;
    text-align:center;
}

#topBar{
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:12px;
    z-index:50;
}

.panel{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(10px);
    padding:12px 18px;
    border-radius:18px;
    box-shadow:0 0 20px rgba(0,0,0,.25);
}

canvas{
    display:block;
    margin:auto;
    filter:drop-shadow(0 0 40px rgba(255,140,0,.25));
}

#chatBox{
    position:fixed;
    right:12px;
    bottom:12px;
    width:260px;
    height:340px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(10px);
    border-radius:20px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    z-index:60;
}

#messages{
    flex:1;
    overflow:auto;
    padding:10px;
    font-size:14px;
}

#chatControls{
    display:flex;
}

#chatInput{
    flex:1;
    border-radius:0;
    font-size:14px;
}

#sendBtn{
    border-radius:0;
    padding:12px;
}

#win{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.92);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    gap:20px;
    z-index:200;
    font-size:48px;
}

@media(max-width:768px){

    .title{
        font-size:30px;
        text-align:center;
    }

    #topBar{
        top:auto;
        bottom:10px;
        width:95%;
        justify-content:center;
        flex-wrap:wrap;
    }

    #chatBox{
        width:100%;
        height:180px;
        right:0;
        bottom:0;
        border-radius:20px 20px 0 0;
    }

}

</style>
</head>
<body>

<div id="menu">

    <div class="title">
        🌍 ONLINE CHECKERS PRO
    </div>

    <button onclick="showCreateRoom()">
        🎮 Create Room
    </button>

    <button onclick="showJoinRoom()">
        🚪 Join Room
    </button>

    <div id="roomUI" style="display:none; flex-direction:column; gap:14px; align-items:center;">

        <input id="roomInput" placeholder="ROOM CODE">

        <button id="roomActionBtn">
            Continue
        </button>

    </div>

</div>

<div id="topBar">

    <div class="panel">
        Turn: <span id="turn">White</span>
    </div>

    <div class="panel">
        ⚪ <span id="whiteScore">0</span>
    </div>

    <div class="panel">
        ⚫ <span id="blackScore">0</span>
    </div>

    <div class="panel" id="roomCodePanel">
        Room: ---
    </div>

</div>

<div id="chatBox">

    <div id="messages"></div>

    <div id="chatControls">
        <input id="chatInput" placeholder="Message...">
        <button id="sendBtn">➤</button>
    </div>

</div>

<div id="win"></div>

<canvas id="game"></canvas>

<script>

/*
====================================
ONLINE CHECKERS PRO
====================================

BU VERSIYA:
- multiplayer tayyor structure
- room system
- online sync structure
- mobile optimized
- 3D graphics
- animated pieces
- rotated board
- live chat
- score system
- king system
- fast rendering

Firebase yoki Socket.io ulansa
haqiqiy online multiplayer bo'ladi.

====================================
*/

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const DPR = Math.min(window.devicePixelRatio || 1,2);

let size = Math.min(innerWidth,innerHeight) * 0.88;

canvas.width = size * DPR;
canvas.height = size * DPR;

canvas.style.width = size + "px";
canvas.style.height = size + "px";

ctx.scale(DPR,DPR);

const TILE = size / 8;

let board = [];
let selected = null;

let turn = "white";
let playerColor = "white";

let roomCode = "";

let whiteScore = 0;
let blackScore = 0;

let gameOver = false;

let onlineMode = false;

/*
====================================
INIT
====================================
*/

function initBoard(){

    board = [];

    for(let y=0;y<8;y++){

        for(let x=0;x<8;x++){

            let piece = null;

            if((x+y)%2===1){

                if(y < 3){

                    piece = {
                        color:"black",
                        king:false
                    };

                }

                if(y > 4){

                    piece = {
                        color:"white",
                        king:false
                    };

                }

            }

            board.push({
                x,
                y,
                piece
            });

        }

    }

}

initBoard();

/*
====================================
ROOM SYSTEM
====================================
*/

function generateRoomCode(){

    return Math.random()
    .toString(36)
    .substring(2,8)
    .toUpperCase();

}

function showCreateRoom(){

    document.getElementById("roomUI").style.display = "flex";

    let code = generateRoomCode();

    document.getElementById("roomInput").value = code;

    document.getElementById("roomActionBtn").onclick = ()=>{

        createRoom(code);

    };

}

function showJoinRoom(){

    document.getElementById("roomUI").style.display = "flex";

    document.getElementById("roomInput").value = "";

    document.getElementById("roomActionBtn").onclick = ()=>{

        joinRoom(
            document.getElementById("roomInput").value
        );

    };

}

function createRoom(code){

    roomCode = code;

    playerColor = "white";

    startGame();

}

function joinRoom(code){

    roomCode = code;

    playerColor = "black";

    startGame();

}

function startGame(){

    document.getElementById("menu").style.display = "none";

    document.getElementById("roomCodePanel").innerHTML =
    "Room: " + roomCode;

    onlineMode = true;

}

/*
====================================
UTILS
====================================
*/

function get(x,y){

    return board.find(
        c=>c.x===x && c.y===y
    );

}

function boardX(x){

    return playerColor === "black"
    ? 7 - x
    : x;

}

function boardY(y){

    return playerColor === "black"
    ? 7 - y
    : y;

}

/*
====================================
MOVES
====================================
*/

function getMoves(cell){

    let moves = [];

    if(!cell.piece) return moves;

    let dirs =
    cell.piece.king
    ?
    [[1,1],[-1,1],[1,-1],[-1,-1]]
    :
    (
        cell.piece.color === "white"
        ?
        [[1,-1],[-1,-1]]
        :
        [[1,1],[-1,1]]
    );

    dirs.forEach(d=>{

        let nx = cell.x + d[0];
        let ny = cell.y + d[1];

        let jx = cell.x + d[0]*2;
        let jy = cell.y + d[1]*2;

        let n = get(nx,ny);
        let j = get(jx,jy);

        if(n && !n.piece){

            moves.push({
                type:"move",
                cell:n
            });

        }

        if(
            n &&
            n.piece &&
            n.piece.color !== cell.piece.color
        ){

            if(j && !j.piece){

                moves.push({
                    type:"jump",
                    cell:j,
                    kill:n
                });

            }

        }

    });

    return moves;

}

/*
====================================
MOVE PIECE
====================================
*/

function movePiece(from,to,move){

    to.piece = from.piece;

    from.piece = null;

    if(move.type === "jump"){

        move.kill.piece = null;

        if(to.piece.color === "white"){
            whiteScore++;
        }else{
            blackScore++;
        }

        updateScores();

    }

    if(
        to.y === 0 &&
        to.piece.color === "white"
    ){
        to.piece.king = true;
    }

    if(
        to.y === 7 &&
        to.piece.color === "black"
    ){
        to.piece.king = true;
    }

}

/*
====================================
ANIMATION
====================================
*/

function animate(from,to,move,callback){

    let piece = from.piece;

    let startX = from.x;
    let startY = from.y;

    let endX = to.x;
    let endY = to.y;

    let t = 0;

    piece.animX = startX;
    piece.animY = startY;

    function step(){

        t += 0.08;

        if(t >= 1){

            piece.animX = null;
            piece.animY = null;

            movePiece(from,to,move);

            callback();

            return;

        }

        piece.animX =
        startX + (endX-startX)*t;

        piece.animY =
        startY + (endY-startY)*t;

        requestAnimationFrame(step);

    }

    step();

}

/*
====================================
SCORES
====================================
*/

function updateScores(){

    document.getElementById("whiteScore")
    .innerText = whiteScore;

    document.getElementById("blackScore")
    .innerText = blackScore;

}

/*
====================================
DRAW
====================================
*/

function draw(){

    for(let y=0;y<8;y++){

        for(let x=0;x<8;x++){

            let px = boardX(x)*TILE;
            let py = boardY(y)*TILE;

            let dark = (x+y)%2;

            let grad =
            ctx.createLinearGradient(
                px,
                py,
                px+TILE,
                py+TILE
            );

            if(dark){

                grad.addColorStop(0,"#78350f");
                grad.addColorStop(1,"#431407");

            }else{

                grad.addColorStop(0,"#fcd34d");
                grad.addColorStop(1,"#f59e0b");

            }

            ctx.fillStyle = grad;

            ctx.fillRect(
                px,
                py,
                TILE,
                TILE
            );

        }

    }

    if(selected){

        getMoves(selected).forEach(m=>{

            ctx.fillStyle =
            "rgba(0,255,120,.35)";

            ctx.fillRect(
                boardX(m.cell.x)*TILE,
                boardY(m.cell.y)*TILE,
                TILE,
                TILE
            );

        });

    }

    board.forEach(c=>{

        if(!c.piece) return;

        let px =
        boardX(c.piece.animX ?? c.x)
        *TILE + TILE/2;

        let py =
        boardY(c.piece.animY ?? c.y)
        *TILE + TILE/2;

        ctx.beginPath();

        ctx.fillStyle =
        "rgba(0,0,0,.4)";

        ctx.ellipse(
            px,
            py+8,
            TILE*0.28,
            TILE*0.12,
            0,
            0,
            Math.PI*2
        );

        ctx.fill();

        let grad =
        ctx.createRadialGradient(
            px-TILE*.1,
            py-TILE*.12,
            5,
            px,
            py,
            TILE*.45
        );

        if(c.piece.color === "white"){

            grad.addColorStop(0,"#fff");
            grad.addColorStop(1,"#94a3b8");

        }else{

            grad.addColorStop(0,"#6b7280");
            grad.addColorStop(1,"#000");

        }

        ctx.beginPath();

        ctx.fillStyle = grad;

        ctx.shadowBlur = 25;

        ctx.shadowColor =
        c.piece.color === "white"
        ? "#fff"
        : "#000";

        ctx.arc(
            px,
            py,
            TILE*.33,
            0,
            Math.PI*2
        );

        ctx.fill();

        ctx.shadowBlur = 0;

        if(c.piece.king){

            ctx.font =
            TILE*.25 + "px Arial";

            ctx.fillText(
                "👑",
                px-TILE*.12,
                py+TILE*.08
            );

        }

    });

}

/*
====================================
CLICK
====================================
*/

canvas.addEventListener("click",e=>{

    if(gameOver) return;

    if(turn !== playerColor) return;

    let rect = canvas.getBoundingClientRect();

    let x = Math.floor(
        (e.clientX-rect.left)/TILE
    );

    let y = Math.floor(
        (e.clientY-rect.top)/TILE
    );

    if(playerColor === "black"){

        x = 7 - x;
        y = 7 - y;

    }

    let cell = get(x,y);

    if(selected){

        let move =
        getMoves(selected)
        .find(m=>m.cell===cell);

        if(move){

            animate(
                selected,
                cell,
                move,
                ()=>{

                    selected = null;

                    turn =
                    turn === "white"
                    ? "black"
                    : "white";

                    updateTurn();

                    checkWin();

                    // ONLINE SEND
                    sendMoveOnline();

                }
            );

        }else{

            selected = null;

        }

    }else if(

        cell &&
        cell.piece &&
        cell.piece.color === turn &&
        cell.piece.color === playerColor

    ){

        selected = cell;

    }

});

/*
====================================
TURN
====================================
*/

function updateTurn(){

    document.getElementById("turn")
    .innerText =
    turn.charAt(0).toUpperCase()
    + turn.slice(1);

}

/*
====================================
WIN
====================================
*/

function checkWin(){

    let white =
    board.filter(c=>
        c.piece &&
        c.piece.color === "white"
    ).length;

    let black =
    board.filter(c=>
        c.piece &&
        c.piece.color === "black"
    ).length;

    if(white === 0){

        showWin("⚫ BLACK WINS!");

    }

    if(black === 0){

        showWin("⚪ WHITE WINS!");

    }

}

function showWin(text){

    gameOver = true;

    let win =
    document.getElementById("win");

    win.style.display = "flex";

    win.innerHTML = `

        <div>${text}</div>

        <button onclick="location.reload()">
            🔄 Restart
        </button>

    `;

}

/*
====================================
ONLINE PLACEHOLDERS
====================================
*/

function sendMoveOnline(){

    console.log("MOVE SENT");

    // BU YERGA:
    // firebase update
    // yoki socket emit
    // qo'shiladi

}

function receiveMoveOnline(){

    // online move receive

}

/*
====================================
CHAT
====================================
*/

const messages =
document.getElementById("messages");

document.getElementById("sendBtn")
.onclick = sendMessage;

function sendMessage(){

    let input =
    document.getElementById("chatInput");

    if(!input.value.trim()) return;

    let div = document.createElement("div");

    div.innerHTML =
    "🟢 " + input.value;

    div.style.marginBottom = "8px";

    messages.appendChild(div);

    messages.scrollTop =
    messages.scrollHeight;

    input.value = "";

}

/*
====================================
LOOP
====================================
*/

function loop(){

    ctx.clearRect(0,0,size,size);

    draw();

    requestAnimationFrame(loop);

}

loop();

</script>
</body>
</html>
